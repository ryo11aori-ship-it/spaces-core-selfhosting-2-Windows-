name: Windows PE Alchemy
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_forge:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: 1. Setup Wine & Tools
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        # 確実なWineパッケージのインストール
        sudo apt-get install -y wine gcc python3

    - name: 2. Forge the Windows DNA
      run: |
        mkdir -p src spaces/self bin
        python3 tools/gen_spaces_compiler_bf_bundler.py > src/compiler_spaces_reader.bf
        python3 tools/bf_to_spaces.py src/compiler_spaces_reader.bf > src/compiler.spaces

    - name: 3. Compile the Oracle VM
      run: |
        gcc -O3 src/ref/vm.c -o bin/ref_vm_gcc

    - name: 4. Birth of the Windows Executable
      run: |
        echo "=== Emitting Windows PE Binary (compiler.exe) ==="
        ./bin/ref_vm_gcc src/compiler.spaces < src/compiler.spaces > compiler.exe
        chmod +x compiler.exe
        
        echo "Hexdump of the generated PE file:"
        hexdump -C compiler.exe | head -n 25

    - name: 5. The Ultimate Test (Windows Spaces Compilation)
      run: |
        echo "=== Executing compiler.exe via Wine ==="
        export WINEDEBUG=-all
        
        # 1. コンパイラ自身に、テスト用のSpacesコードをコンパイルさせる
        python3 tools/bf_to_spaces.py <(echo "+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++.") > test_A.spaces
        wine ./compiler.exe < test_A.spaces > test_A.exe
        chmod +x test_A.exe
        
        # 2. 生成されたWindowsバイナリを実行する！
        wine ./test_A.exe > output_A.txt
        echo "Output from test_A.exe:"
        cat output_A.txt
        
        if ! grep -q "A" output_A.txt; then echo "❌ Compilation or Execution failed!"; exit 1; fi
        echo "✅ SUCCESS! Spaces code was compiled to Windows PE natively, and ran flawlessly!"

    